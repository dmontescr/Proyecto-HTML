      <hr />
    </header>

    <main>
      <h1>Formulario de registro</h1>
      <form action="#">
        <p>
          <label for="name">Nombre completo: </label>
          <input
            type="text"
            name="nombre_completo"
            id="name"
            maxlength="70"
            size="40"
          />
        </p>

        <p>
          <label for="birth">Fecha de nacimiento:</label>
          <input type="date" name="fecha_nacimiento" id="birth" />
        </p>

        <p>
          <label for="email">Email: </label>
          <input type="email" name="email" id="email" size="40" />
        </p>

        <p>
          <label for="address">Dirección: </label> <br />
          <textarea name="direccion" id="address" rows="5" cols="40"></textarea>
        </p>

        <p>
          <label for="web">Página web: </label>
          <input type="url" name="web" id="web" size="50" />
        </p>

        <p>
          <label for="photo">Foto:</label>
          <input type="file" name="foto" id="photo" />
        </p>

        <p>
          <label for="bio">Biografía: </label> <br />
          <textarea name="bio" id="bio" rows="5" cols="40"></textarea>
        </p>

        <p>
          <button>Enviar</button>
          <input
            type="reset"
            name="reset"
            id="reset"
            value="Borrar formulario"
          />
        </p>
      </form>
    </main>
